5.Problem Statement
Explain the z-index, with a code example.

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <div class="box box_1">z-index 1</div>
        <div class="box box_2">z-index 2</div>
        <div class="box box_3">z-index 3</div>
    </div>
</body>

</html>

<style>
    .container {
        position: relative;
    }

    .box {
        position: absolute;
        width: 100px;
        height: 100px;
        color: white;
        text-align: center;
        font-size: 5px;
    }

    .box_1 {
        background-color: red;
    }

    .box_2 {
        background-color: blue;
        top: 50px;
        left: 50px;
        z-index: 1
    }

    .box_3 {
        background-color: green;
        top: 100px;
        left: 100px;
        z-index: 3;
    }
</style>

<!--Q1. Describe the main differences between the CSS Flexbox layout model and the CSS Grid layout model. When 
would you choose to use one over the other?
Answer:
Flexbox
Flexbox when you prioritize content flow and alignment 
over strict placement grids.Linear UI components: Use it for 
navigation bars, menus, and simple toolbars.Content-sized elements:
Perfect when the size of the container needs to adapt dynamically to
text lengths (e.g., tags or badges).Centering or spacing: Excellent 
for quickly shifting and aligning a small group of items along a single line.

CSS Grid:
CSS Grid when you need absolute control over the structural 
alignment of an overall layout.Macro web page structures: Use it to create 
full-page wireframes including sections like header, sidebar, main content, 
and footer.Rigid multi-axis designs: Ideal for dashboards, complex product 
grids, or photo galleries where elements must line up vertically and horizontally.
Asymmetrical layout designs: Use it when elements must explicitly overlap or 
span multiple rows/columns.

The industry-standard strategy is utilizing CSS Grid for the macro layout 
(overall skeleton) and nesting Flexbox for the micro layout (aligning 
elements inside individual grid cells).

Q2. Explain the role of the following key properties in the Flexbox layout mode
1. justify-content
2. align-items
3. gap
4. flex-direction
5. flex-wrap
Answer:
1. justify-content (Main Axis Alignment):
Defines how flex items align along the main-axis (horizontal if direction is row, vertical if column).
flex-start (default): Items pack tightly at the beginning of the line.flex-end: Items pack tightly at the end of the line.
center: Items bunch together in the middle of the line.
space-between: First item hits the start, last item hits the end, empty space distributes evenly between them.

2. align-items (Cross Axis Alignment):
Defines how flex items align along the cross-axis (perpendicular to the main-axis).
stretch (default): Items stretch to fill the full size of the container along this axis.
flex-start: Items line up at the start edge of the cross-axis.
flex-end: Items line up at the end edge of the cross-axis.
center: Items center themselves perfectly along the cross-axis.
baseline: Items align based on the text baselines inside them.

3. gap:
Defines the spacing between flex items along both the main and cross axes.
row-gap: Sets the vertical spacing between rows of flex items.
column-gap: Sets the horizontal spacing between columns of flex items.

4. flex-direction (The Direction):
Sets the primary axis (main-axis) along which the flex items are laid out.
row (default): Items flow horizontally from left to right.
column: Items flow vertically from top to bottom.
row-reverse / column-reverse: Flips the start and end positions of the flow.

5. flex-wrap:
Controls whether flex items are forced into a single line or can spill over into multiple lines.
nowrap (default): All items squeeze onto one single line, even if they shrink or overflow the container.
wrap: Items automatically break onto new lines if they run out of room.
wrap-reverse: Items break onto new lines, but the rows stack from bottom to top.

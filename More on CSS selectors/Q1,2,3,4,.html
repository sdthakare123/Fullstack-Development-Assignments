Q4.Illustrate one example of a pseudo-class element selector hover example should include the following-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizontal Buttons</title>
    <style>
        .button-container {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            background-color: royalblue;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            margin-top: 100px;
            margin-bottom: 100px;
            color: #ffffff;
            border-radius: 10px;
        }

        .secondary-btn:hover {
            box-shadow: 10px 5px 5px grey;
            cursor: pointer;
        }

        .primary-btn {
            background-color: #007bff;
            color: white;
        }

        .secondary-btn {
            background-color: #007bff;
            color: white;
        }
    </style>
</head>

<body>


    <div class="button-container">
        <button class="btn primary-btn">PW Skills</button>
        <button class="btn secondary-btn">PW Skills</button>
    </div>

</body>

</html>
